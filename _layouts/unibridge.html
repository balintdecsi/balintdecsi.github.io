<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}UniBridge</title>
  <meta name="description" content="UniBridge helps international students navigate Austrian paperwork — visa, housing, insurance & registration.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/tools/unibridge/assets/css/unibridge.css' | relative_url }}">
</head>
<body>
  <header class="ub-header">
    <nav class="ub-nav">
      <a href="{{ '/tools/unibridge/' | relative_url }}" class="ub-logo">
        <span class="ub-logo-icon">🎓</span>
        <span class="ub-logo-text">UniBridge</span>
      </a>
      <a href="{{ '/tools/unibridge/' | relative_url }}" class="ub-nav-home">Home</a>
    </nav>
  </header>

  <main class="ub-main">
    {{ content }}
  </main>

  <div class="ub-qr" aria-label="QR code linking to UniBridge">
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://balintdecsi.github.io/tools/unibridge/" alt="QR code to UniBridge" width="100" height="100">
    <span class="ub-qr-label">Scan to visit</span>
  </div>
</body>
</html>
